<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prorai8 ROI Calculator</title>
  <meta name="description" content="Estimate ROI for Prorai8’s Double-8 strategy: long-term + mid-term, auto-shifted by demand." />

  <style>
/* ===== NAVBAR + SEARCH ===== */
.navbar{
  position: sticky;
  top: 0;
  z-index: 999;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
  padding:12px 16px;
  background:#020617;
  color:#fff;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

.navbrand{
  font-weight:700;
  letter-spacing:0.2px;
}

.search-wrap{
  position:relative;
  width:min(520px, 70vw);
  display:flex;
  gap:10px;
  align-items:center;
}

.search-input{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.14);
  background:#0b1220;
  color:#fff;
  outline:none;
  min-width:0;
}

.search-btn{
  padding:10px 12px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.14);
  background:#0b1220;
  color:#fff;
  cursor:pointer;
  white-space:nowrap;
}
    .search-input::placeholder{ 
      color:rgba(255,255,255,0.55);
    }
    .search-results{
      position:absolute;
      top: calc(100% + 8px);
      left:0;
      right:0;
      background:#0b1220;
      border:1px solid rgba(255,255,255,0.14);
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 14px 40px rgba(0,0,0,0.35);
      display:none;
    }
    .search-item{
      padding:10px 12px;
      cursor:pointer;
      color:#fff;
      border-top:1px solid rgba(255,255,255,0.06);
    }
    .search-item:first-child{ border-top:none; }
    .search-item:hover{ background:rgba(255,255,255,0.06);
    }
    .search-item small{ display:block; color:rgba(255,255,255,0.6); margin-top:2px; 
    }

    /* ===== CHAT BUTTON ===== */
    #ai-toggle{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#2563eb;
      color:white;
      padding:12px 18px;
      border-radius:30px;
      border:none;
      cursor:pointer;
      z-index:1001;
    }

    /* ===== CHATBOX ===== */
    #ai-chatbox{
      display:none;
      position:fixed;
      bottom:80px;
      right:20px;
      width:340px;
      height:380px;
      background:#020617;
      color:white;
      border-radius:14px;
      box-shadow:0 10px 25px rgba(0,0,0,0.25);
      overflow:hidden;
      z-index:1000;
      border:1px solid rgba(255,255,255,0.10);
    }
    .chat-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      background:#0b1220;
      border-bottom:1px solid rgba(255,255,255,0.10);
    }
    .chat-title{ font-weight:700; font-size:14px; }
    .chat-close{
      background:transparent;
      border:none;
      color:#fff;
      font-size:16px;
      cursor:pointer;
      opacity:0.85;
    }
    .chat-close:hover{ opacity:1; }

    .chat-messages{
      height: calc(380px - 52px - 56px);
      padding:12px;
      overflow:auto;
    }
    .msg{
      margin: 0 0 10px 0;
      padding:10px 12px;
      border-radius:12px;
      max-width: 90%;
      line-height:1.35;
      font-size:14px;
      white-space:pre-wrap;
    }
    .msg.user{ background:#2563eb; margin-left:auto; }
    .msg.ai{ background:#0b1220; border:1px solid rgba(255,255,255,0.10); }

    .chat-input-row{
      display:flex;
      gap:8px;
      padding:10px 12px;
      border-top:1px solid rgba(255,255,255,0.10);
      background:#0b1220;
    }
    .chat-input{
      flex:1;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.14);
      background:#020617;
      color:#fff;
      outline:none;
    }
    .chat-input::placeholder{ color:rgba(255,255,255,0.55); }
    .chat-send{
      padding:10px 12px;
      border-radius:10px;
      border:none;
      background:#2563eb;
      color:#fff;
      cursor:pointer;
    }

    /* ===== YOUR EXISTING ROI STYLES (kept) ===== */
    :root{
      --bg:#0b0f14;
      --card:#101722;
      --muted:#8aa0b5;
      --text:#e7eef6;
      --line:#1f2c3a;
      --good:#46d39a;
      --warn:#ffcc66;
      --bad:#ff6b6b;
      --accent:#6aa9ff;
      --shadow: 0 18px 40px rgba(0,0,0,.35);
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      background: radial-gradient(1200px 700px at 70% -10%, rgba(106,169,255,.18), transparent 55%),
                  radial-gradient(900px 650px at 10% 0%, rgba(70,211,154,.12), transparent 60%),
                  var(--bg);
      color:var(--text);
      line-height:1.4;
    }
    a{color:var(--accent); text-decoration:none}
    a:hover{text-decoration:underline}
    .wrap{max-width:1100px; margin:0 auto; padding:28px 18px 60px;}
    header{
      display:flex; gap:18px; flex-wrap:wrap; align-items:flex-end; justify-content:space-between;
      padding:12px 2px 18px;
      border-bottom:1px solid rgba(255,255,255,.06);
      margin-bottom:18px;
    }
    .brand h1{margin:0; font-size:28px; letter-spacing:.2px}
    .brand p{margin:6px 0 0; color:var(--muted); max-width:680px}
    .pillbar{display:flex; gap:10px; flex-wrap:wrap; align-items:center; justify-content:flex-end}
    .pill{
      border:1px solid rgba(255,255,255,.10);
      background:rgba(255,255,255,.04);
      padding:8px 10px; border-radius:999px; color:var(--muted);
      font-size:13px;
    }
    .grid{
      display:grid;
      grid-template-columns: 1.1fr .9fr;
      gap:16px;
      margin-top:16px;
    }
    @media (max-width: 980px){
      .grid{grid-template-columns:1fr}
    }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .card .hd{
      padding:14px 16px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background: rgba(16,23,34,.55);
    }
    .card .hd h2{margin:0; font-size:16px}
    .card .bd{padding:16px}
    .row{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
    }
    @media (max-width: 520px){
      .row{grid-template-columns:1fr}
    }
    label{
      display:block;
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
    }
    input, select{
      width:100%;
      padding:10px 10px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      color:var(--text);
      outline:none;
    }
    input:focus, select:focus{border-color: rgba(106,169,255,.55); box-shadow:0 0 0 4px rgba(106,169,255,.12);}
    .hint{
      margin-top:8px;
      font-size:12px;
      color:var(--muted);
    }
    .modeTabs{ display:flex; gap:8px; flex-wrap:wrap; }
    .tab{
      cursor:pointer;
      padding:8px 10px;
      font-size:13px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.03);
      color:var(--muted);
      user-select:none;
    }
    .tab[aria-selected="true"]{
      background: rgba(106,169,255,.18);
      border-color: rgba(106,169,255,.45);
      color: var(--text);
    }
    .kpis{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }
    @media (max-width: 520px){
      .kpis{grid-template-columns:1fr}
    }
    .kpi{
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.18);
      border-radius: 14px;
      padding:12px;
    }
    .kpi .t{font-size:12px; color:var(--muted)}
    .kpi .v{font-size:18px; margin-top:6px}
    .kpi .s{font-size:12px; margin-top:6px; color:var(--muted)}
    .good{color:var(--good)}
    .warn{color:var(--warn)}
    .bad{color:var(--bad)}
    .split{
      display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between;
      margin-top:10px;
      padding-top:12px;
      border-top:1px solid rgba(255,255,255,.06);
    }
    .btn{
      cursor:pointer;
      border:none;
      border-radius: 12px;
      padding:10px 12px;
      background: rgba(70,211,154,.18);
      color: var(--text);
      border:1px solid rgba(70,211,154,.35);
      font-weight:600;
    }
    .btn:hover{filter:brightness(1.06)}
    .btn.secondary{
      background: rgba(255,255,255,.05);
      border-color: rgba(255,255,255,.10);
      color: var(--muted);
      font-weight:600;
    }
    .small{ font-size:12px; color:var(--muted); }
    .table{
      width:100%;
      border-collapse: separate;
      border-spacing: 0;
      overflow:hidden;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.12);
    }
    .table th, .table td{
      padding:10px 10px;
      border-bottom:1px solid rgba(255,255,255,.06);
      font-size:13px;
    }
    .table th{color:var(--muted); font-weight:600; text-align:left}
    .table tr:last-child td{border-bottom:none}
    .foot{ margin-top:14px; font-size:12px; color:var(--muted); }
    .callout{
      border:1px solid rgba(106,169,255,.22);
      background: rgba(106,169,255,.08);
      padding:12px;
      border-radius:14px;
      margin-bottom:12px;
      color: var(--text);
    }
    .callout b{color:#dfeaff}
    .back-home{ padding:10px 16px; }
  </style>
</head>
 
<body>
<div style="padding:10px;background:#16a34a;color:white;font-weight:700;">
  VERSION TEST: March 5
</div>  <div class="navbar">
    <div class="navbrand">
      <a href="/" style="color:#fff;text-decoration:none;">Prorai8</a>
    </div>

    <form id="site-search-form" class="search-wrap" action="javascript:void(0)">
      <input
        id="site-search"
        class="search-input"
        type="search"
        placeholder="Search (ROI, pricing, contact)…"
        autocomplete="off"
        enterkeyhint="search"
      />
      <button class="search-btn" type="submit">Search</button>
      <div id="search-results" class="search-results"></div>
    </form>
  </div>

  <div class="back-home">
    <a href="/">← Back to Home</a>
  </div>

  <!-- ROI CALCULATOR (this MUST contain your calculator HTML, not just comments) -->
  <div class="wrap">
    <!-- paste your FULL calculator HTML here -->
  </div>

  <!-- AI BUTTON + CHATBOX -->
  <button id="ai-toggle" aria-expanded="false" aria-controls="ai-chatbox">Ask Prorai8 AI</button>

  <div id="ai-chatbox" role="dialog" aria-label="AI Chat">
    <div class="chat-header">
      <div class="chat-title">Prorai8 Assistant</div>
      <button id="ai-close" class="chat-close" type="button" aria-label="Close">✕</button>
    </div>

    <div id="ai-messages" class="chat-messages">
      <div class="msg ai">Hello 👋 Ask me about ROI, rent estimates, or property deals.</div>
    </div>

    <form id="ai-form" class="chat-input-row">
      <input id="ai-input" class="chat-input" type="text" placeholder="Type your question…" autocomplete="off" />
      <button id="ai-send" class="chat-send" type="submit">Send</button>
    </form>
  </div>
 
  <script>
  // ===== CHATBOX =====
  const toggleBtn = document.getElementById('ai-toggle');
  const chatbox   = document.getElementById('ai-chatbox');
  const closeBtn  = document.getElementById('ai-close');
  const chatForm  = document.getElementById('ai-form');
  const chatInput = document.getElementById('ai-input');
  const messages  = document.getElementById('ai-messages');

  if (toggleBtn && chatbox && closeBtn && chatForm && chatInput && messages) {
    function openChat(){
      chatbox.style.display = 'block';
      toggleBtn.setAttribute('aria-expanded', 'true');
      setTimeout(() => chatInput.focus(), 0);
    }
    function closeChat(){
      chatbox.style.display = 'none';
      toggleBtn.setAttribute('aria-expanded', 'false');
    }
    function addMsg(text, who){
      const div = document.createElement('div');
      div.className = 'msg ' + who;
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    toggleBtn.addEventListener('click', () => {
      const isOpen = chatbox.style.display === 'block';
      isOpen ? closeChat() : openChat();
    });

    closeBtn.addEventListener('click', closeChat);

    chatForm.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = (chatInput.value || '').trim();
      if(!text) return;
      addMsg(text, 'user');
      chatInput.value = '';
      addMsg("Got it — you said: " + text, 'ai');
    });
  }

  // ===== SEARCH =====
  const searchInput  = document.getElementById('site-search');
  const resultsBox   = document.getElementById('search-results');
  const searchForm   = document.getElementById('site-search-form');

  const PAGES = [
    { title: "ROI Calculator", desc: "Estimate returns with Double-8 strategy", url: "/roi/" },
    { title: "Pricing", desc: "Plans and what’s included", url: "/pricing" },
    { title: "Contact", desc: "Get in touch", url: "/contact" },
    { title: "About", desc: "What Prorai8 is building", url: "/about" }
  ];

  function renderResults(items){
    if(!items.length){
      resultsBox.style.display = 'none';
      resultsBox.innerHTML = '';
      return;
    }
    resultsBox.innerHTML = items.map(i => `
      <div class="search-item" data-url="${i.url}">
        ${i.title}
        <small>${i.desc}</small>
      </div>
    `).join('');
    resultsBox.style.display = 'block';
  }

  // typing search
  searchInput?.addEventListener('input', () => {
    const q = (searchInput.value || '').trim().toLowerCase();
    if(!q){ renderResults([]); return; }
    const hits = PAGES
      .filter(p => (p.title + " " + p.desc).toLowerCase().includes(q))
      .slice(0, 6);
    renderResults(hits);
  });

  // Enter/Search button submit
  searchForm?.addEventListener('submit', (e) => {
    e.preventDefault();
    const q = (searchInput.value || '').trim().toLowerCase();
    if(!q){ renderResults([]); return; }
    const hits = PAGES
      .filter(p => (p.title + " " + p.desc).toLowerCase().includes(q))
      .slice(0, 6);
    renderResults(hits);
  });

  // click result
  resultsBox?.addEventListener('click', (e) => {
    const item = e.target.closest('.search-item');
    if(!item) return;
    window.location.href = item.getAttribute('data-url');
  });

  // close dropdown on outside click
  document.addEventListener('click', (e) => {
    if(resultsBox && !resultsBox.contains(e.target) && e.target !== searchInput){
      resultsBox.style.display = 'none';
    }
  });
</script>
  <!-- GOOGLE PLACES (optional) -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=YOUR_KEY&libraries=places&callback=initPlaces">
  </script>
</body>
</html>
